<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Time Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
   <link rel="stylesheet" href="assest/style/style.css">
</head>

<body>
    <div class="phone-wrapper">

        <div class="header">
            <span class="back-btn"><i class="bi bi-chevron-left"></i></span>
            <h1>Screen Time Management</h1>
        </div>

        <div class="content">

            <p class="section-label">Daily Allocation</p>

            <div class="days-row">
                <div class="day-item">
                    <span class="day-name">SUN</span>
                    <span class="day-value">Unltd</span>
                </div>
                <div class="day-item">
                    <span class="day-name">Mon</span>
                    <span class="day-value">Unltd</span>
                </div>
                <div class="day-item">
                    <span class="day-name">Tue</span>
                    <span class="day-value">Unltd</span>
                </div>
                <div class="day-item">
                    <span class="day-name">Wed</span>
                    <span class="day-value">Unltd</span>
                </div>
                <div class="day-item">
                    <span class="day-name">Thu</span>
                    <span class="day-value">Unltd</span>
                </div>
                <div class="day-item">
                    <span class="day-name">Fri</span>
                    <span class="day-value">Unltd</span>
                </div>
                <div class="day-item">
                    <span class="day-name">Sat</span>
                    <span class="day-value">Unltd</span>
                </div>
            </div>

            <hr class="divider">

            <div class="option-row">
                <span class="option-label">When screen time runs out</span>
                <span class="option-value">No Internet</span>
            </div>

            <hr class="divider">

            <div class="screen-time-today">
                <p class="today-label">Screen Time Today</p>

                <div class="time-stats">
                    <div class="time-block">
                        <span class="stat-label">USED</span>
                        <span class="stat-value" id="used-time">3h 16m</span>
                    </div>
                    <div class="time-block">
                        <span class="stat-label">LEFT</span>
                        <span class="stat-value" id="left-time">3h 44m</span>
                    </div>
                </div>

                <p class="adjust-label">adjust available for today</p>

                <div class="adjust-buttons">
                    <button class="circle-btn" id="decrease-btn" onclick="adjustTime(-30)">
                        <i class="bi bi-dash"></i>
                    </button>
                    <button class="circle-btn" id="increase-btn" onclick="adjustTime(30)">
                        <i class="bi bi-plus"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

   
</body>
</html>
